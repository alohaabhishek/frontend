name: Deploy Frontend to ECS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev-my-aws-app
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Debug AWS Config
        run: |
          echo "AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}"
          echo "AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          echo "AWS_REGION: ${{ secrets.AWS_REGION }}"

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Image
        run: |
          docker build -t frontend:${{ github.sha }} .

      - name: Tag Image
        run: |
          docker tag frontend:${{ github.sha }} ${{ secrets.ECR_FRONTEND }}:${{ github.sha }}

      - name: Push Image
        run: |
          docker push ${{ secrets.ECR_FRONTEND }}:${{ github.sha }}

      # 🔥 NEW STEP: Update Task Definition
      - name: Fill in new image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: frontend-app-container
          image: ${{ secrets.ECR_FRONTEND }}:${{ github.sha }}

      # 🔥 Deploy updated task definition
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.FRONTEND_SERVICE }}
          cluster: ${{ secrets.CLUSTER_NAME }}